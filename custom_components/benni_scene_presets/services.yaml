apply_preset:
  name: "Apply preset"
  description: Apply a scene preset to specified light entities
  fields:
    preset:
      name: "Preset"
      description: "Scene name or slug"
      example: "overwatch-talon"
      required: true
      selector:
        text: null
    targets:
      name: "Targets"
      description: "What to apply the preset to"
      required: true
      selector:
        target:
          entity:
            domain:
              - light
              - group
    brightness:
      name: "Brightness"
      description: "Override the presets brightness"
      example: 150
      selector:
        number:
          min: 0
          max: 255
    transition:
      name: "Transition"
      description: "Transition duration between states"
      example: 1
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
    shuffle:
      name: "Shuffle"
      description: "Shuffle the colors before applying"
      example: true
      selector:
        boolean:
    smart_shuffle:
      name: "Smart shuffle"
      description: "Ensure smooth color transitions when shuffling"
      example: true
      selector:
        boolean:

get_dynamic_scenes:
  name: "Get dynamic scenes"
  description: Get all currently active dynamic scenes

start_dynamic_scene:
  name: "Start dynamic scene"
  description: Start a loop that periodically applies a shuffled scene preset
  fields:
    preset:
      name: "Preset"
      description: "Scene name or slug"
      example: "overwatch-talon"
      required: true
      selector:
        text: null
    targets:
      name: "Targets"
      description: "What to apply the preset to"
      required: true
      selector:
        target:
          entity:
            domain:
              - light
              - group
    brightness:
      name: "Brightness"
      description: "Override the presets brightness"
      example: 150
      selector:
        number:
          min: 0
          max: 255
    transition:
      name: "Transition"
      description: "Transition duration between states"
      example: 1
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
    initial_transition:
      name: "Initial transition"
      description: "Transition for the very first paint. If omitted, the regular transition is used for a smooth crossfade. Set to 0.5 to restore the original snap-in behaviour."
      example: 0.5
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
          unit_of_measurement: seconds
    interval:
      name: "Interval"
      description: "Time between color changes"
      example: 60
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds

stop_dynamic_scene:
  name: "Stop dynamic scene"
  description: Stop a dynamic scene by ID
  fields:
    id:
      name: ID
      description: "The UUID of the dynamic scene to stop"
      required: true
      example: "d1db9696-e8ef-41b7-ba71-af696ee89b28"
      selector:
        text: null

stop_dynamic_scenes_for_targets:
  name: "Stop dynamic scenes for targets"
  description: Stops all dynamic scenes that include any of the specified targets
  fields:
    targets:
      name: "Targets"
      description: "Targets to stop all dynamic scenes for"
      required: true
      selector:
        target:
          entity:
            domain:
              - light
              - group

stop_all_dynamic_scenes:
  name: "Stop all dynamic scenes"
  description: Stops all currently running dynamic scenes

apply_look:
  name: "Apply look"
  description: >-
    Apply a named look. Each of the look's bindings starts its own dynamic
    scene on its own lights, so several scenes can run at once on different
    light sets.
  fields:
    look:
      name: "Look"
      description: "Look name or slug"
      required: true
      selector:
        text: null
    brightness:
      name: "Brightness"
      description: "Brightness override applied to all bindings (usually supplied by the light policy / day phase)"
      example: 200
      selector:
        number:
          min: 0
          max: 255
    transition:
      name: "Transition"
      description: >-
        First-paint fade override (seconds). Overrides the look's crossfade for
        this apply — e.g. a short value for a brightness-only change so it shows
        immediately. Omit to keep the look/scene default.
      example: 2
      selector:
        number:
          min: 0
          max: 300
          step: 0.1
          unit_of_measurement: seconds

stop_look:
  name: "Stop look"
  description: Stops all dynamic scenes belonging to a look's lights
  fields:
    look:
      name: "Look"
      description: "Look name or slug"
      required: true
      selector:
        text: null

reset_userdata:
  name: "Reset user data"
  description: >-
    Deletes ALL custom scenes and looks (the userdata HACS keeps across
    reinstalls). Use this to start from a clean slate. Cannot be undone.
  fields:
    delete_images:
      name: "Delete images"
      description: "Also delete uploaded scene images"
      default: true
      selector:
        boolean:
